<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: preserve path in sessionStorage and redirect to index
      sessionStorage.setItem('spa_redirect', location.pathname + location.search + location.hash)
      location.replace('/API-Front/')
    </script>
  </head>
  <body></body>
</html>
